body{

}

}

.page-header{
background:#4caf50;
color:white;
padding:60px 20px;

}

form{
background:#f4f4f4;

}

input, textarea, select{

}

label{

<body>

<header>
<div class="container">
<h2>Green Valley Landscaping</h2>

<nav>
<a href="index.html">Home</a>

<section class="page-header">
<h1>Request a Free Estimate</h1>
<p>Tell us about your project and we’ll get back to you quickly.</p>

<section class="container">

<form>

<label>Name</label>
<input type="text" placeholder="Your Name" required>

<label>Phone</label>
<input type="tel" placeholder="Your Phone Number" required>

<label>Email</label>
<input type="email" placeholder="Your Email">

<label>Service Needed</label>
<select>
<option>Lawn Maintenance</option>
<option>Mulching</option>
<option>Hardscaping</option>
<option>Cleanup</option>
<option>Other</option>
</select>

<label>Property Address or City</label>
<input type="text" placeholder="City or Address">

<label>Project Details</label>
<textarea rows="5" placeholder="Describe what you need done..."></textarea>

<label>Upload Photos (optional)</label>
<input type="file">

<button class="button" type="submit">Request Estimate</button>

</form>

</section>

<footer>
<p>Green Valley Landscaping</p>
<p>Serving Harrisburg, Camp Hill, Mechanicsburg</p>
